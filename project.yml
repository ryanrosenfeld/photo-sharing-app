name: PhotoShare
options:
  bundleIdPrefix: com.photoshare
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES

targets:
  PhotoShare:
    type: application
    platform: iOS
    sources:
      - path: PhotoShare
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        INFOPLIST_FILE: PhotoShare/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanrosenfeld.photoshare
        DEVELOPMENT_TEAM: ""
    info:
      path: PhotoShare/Info.plist
      properties:
        CFBundleDisplayName: PhotoShare
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "PhotoShare reads your photo library to detect friends' faces and auto-share photos with them."
        NSPhotoLibraryAddUsageDescription: "Save photos shared with you to your camera roll."
        NSContactsUsageDescription: "Find which of your contacts are already on PhotoShare."
        NSLocationWhenInUseUsageDescription: "Attach your location to photos you share."
        CFBundleURLTypes:
          - CFBundleURLName: "Google Sign-In"
            CFBundleURLSchemes:
              - "REPLACE_WITH_REVERSED_CLIENT_ID"  # e.g. com.googleusercontent.apps.123456789-xxxx
          - CFBundleURLName: "PhotoShare Auth"
            CFBundleURLSchemes:
              - "photoshare"
